<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prendas - La Memoria del Hilo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; background-color: #F5EFE6; color: #2C1810; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>

<!-- Encabezado -->
<header style="background-color: #2C1810;" class="py-8 px-12">
    <h1 style="color: #F5EFE6;" class="text-4xl">La Memoria del Hilo</h1>
    <p style="color: #8B6914;" class="text-lg italic mt-2">"Cada prenda guarda una historia"</p>
</header>

<!-- Navegación -->
<nav style="background-color: #EDE0D4;" class="px-12 py-4 flex gap-8">
    <a href="/" style="color: #2C1810;" class="hover:underline">Inicio</a>
    <a href="/prendas" style="color: #8B6914; font-weight:bold;" class="hover:underline">Prendas</a>
    <a href="/clientes" style="color: #2C1810;" class="hover:underline">Clientes</a>
    <a href="/ventas" style="color: #2C1810;" class="hover:underline">Ventas</a>
</nav>

<!-- Contenido -->
<main class="px-12 py-12">

    <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl">Prendas</h2>
        <a href="/prendas/nueva"
           style="background-color: #8B6914; color: #F5EFE6;"
           class="px-6 py-3 rounded-lg">
            + Nueva prenda
        </a>
    </div>

    <!-- Tabla de prendas -->
    <div style="background-color: #EDE0D4;" class="rounded-xl overflow-hidden">
        <table class="w-full">
            <thead>
            <tr style="background-color: #2C1810; color: #F5EFE6;">
                <th class="px-6 py-4 text-left">Nombre</th>
                <th class="px-6 py-4 text-left">Tipo</th>
                <th class="px-6 py-4 text-left">Estado</th>
                <th class="px-6 py-4 text-left">Precio Base</th>
                <th class="px-6 py-4 text-left">Precio Venta</th>
                <th class="px-6 py-4 text-left">Stock</th>
                <th class="px-6 py-4 text-left">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="prenda : ${prendas}"
                style="border-bottom: 1px solid #F5EFE6;"
                class="hover:opacity-80">
                <td class="px-6 py-4" th:text="${prenda.nombre}"></td>
                <td class="px-6 py-4" th:text="${prenda.tipo}"></td>
                <td class="px-6 py-4" th:text="${prenda.estado}"></td>
                <td class="px-6 py-4" th:text="${'$' + prenda.precioBase}"></td>
                <td class="px-6 py-4" th:text="${'$' + prenda.calcularPrecio()}"></td>
                <td class="px-6 py-4">
                            <span th:if="${prenda.stock > 0}"
                                  style="color: #4A6741; font-weight: bold;"
                                  th:text="${prenda.stock}"></span>
                    <span th:if="${prenda.stock == 0}"
                          style="color: #8B4A4A; font-weight: bold;">Sin stock</span>
                </td>
                <td class="px-6 py-4 flex gap-4">
                    <a th:href="@{/prendas/editar/{id}(id=${prenda.id})}"
                       style="color: #3D5A73;" class="hover:underline">Editar</a>
                    <a th:href="@{/prendas/eliminar/{id}(id=${prenda.id})}"
                       style="color: #8B4A4A;" class="hover:underline"
                       onclick="return confirm('¿Eliminás esta prenda?')">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</main>

<!-- Pie de página -->
<footer style="background-color: #2C1810; color: #F5EFE6;" class="px-12 py-6 mt-12 text-center">
    <p style="color: #8B6914;" class="italic">La Memoria del Hilo — TP Diseño de Sistemas — Escuela Da Vinci</p>
</footer>

</body>
</html>
