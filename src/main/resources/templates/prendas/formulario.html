<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenda - La Memoria del Hilo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; background-color: #F5EFE6; color: #2C1810; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        input, select { background-color: #F5EFE6; border: 1px solid #5C3D2E; border-radius: 8px; padding: 10px 14px; width: 100%; color: #2C1810; }
        label { display: block; margin-bottom: 6px; color: #5C3D2E; font-size: 14px; }
    </style>
</head>
<body>

<!-- Encabezado -->
<header style="background-color: #2C1810;" class="py-8 px-12">
    <h1 style="color: #F5EFE6;" class="text-4xl">La Memoria del Hilo</h1>
    <p style="color: #8B6914;" class="text-lg italic mt-2">"Cada prenda guarda una historia"</p>
</header>

<!-- Navegación -->
<nav style="background-color: #EDE0D4;" class="px-12 py-4 flex gap-8">
    <a href="/" style="color: #2C1810;" class="hover:underline">Inicio</a>
    <a href="/prendas" style="color: #8B6914; font-weight:bold;" class="hover:underline">Prendas</a>
    <a href="/clientes" style="color: #2C1810;" class="hover:underline">Clientes</a>
    <a href="/ventas" style="color: #2C1810;" class="hover:underline">Ventas</a>
</nav>

<!-- Contenido -->
<main class="px-12 py-12">

    <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl" th:text="${prenda.id == null ? 'Nueva Prenda' : 'Editar Prenda'}"></h2>
        <a href="/prendas" style="color: #5C3D2E;" class="hover:underline">← Volver</a>
    </div>

    <div style="background-color: #EDE0D4;" class="rounded-xl p-8 max-w-2xl">

        <form th:action="${prenda.id == null ? '/prendas/nueva' : '/prendas/editar/' + prenda.id}"
              th:object="${prenda}" method="post">

            <div class="mb-6">
                <label>Nombre</label>
                <input type="text" th:field="*{nombre}" placeholder="Ej: Camisa Oxford"/>
            </div>

            <div class="mb-6">
                <label>Tipo de prenda</label>
                <select th:field="*{tipo}">
                    <option value="">Seleccioná un tipo</option>
                    <option th:each="tipo : ${tipos}"
                            th:value="${tipo}"
                            th:text="${tipo}"></option>
                </select>
            </div>

            <div class="mb-6">
                <label>Estado</label>
                <select th:field="*{estado}">
                    <option value="">Seleccioná un estado</option>
                    <option th:each="estado : ${estados}"
                            th:value="${estado}"
                            th:text="${estado}"></option>
                </select>
            </div>

            <div class="mb-6">
                <label>Precio base</label>
                <input type="number" step="0.01" th:field="*{precioBase}" placeholder="0.00"/>
            </div>

            <div class="mb-6">
                <label>Descuento (solo si el estado es PROMOCION)</label>
                <input type="number" step="0.01" th:field="*{descuento}" placeholder="0.00"/>
            </div>

            <div class="mb-8">
                <label>Stock</label>
                <input type="number" th:field="*{stock}" placeholder="0"/>
            </div>

            <div class="flex gap-4">
                <button type="submit"
                        style="background-color: #8B6914; color: #F5EFE6;"
                        class="px-8 py-3 rounded-lg">
                    Guardar
                </button>
                <a href="/prendas"
                   style="background-color: transparent; color: #5C3D2E; border: 1px solid #5C3D2E;"
                   class="px-8 py-3 rounded-lg">
                    Cancelar
                </a>
            </div>

        </form>
    </div>

</main>

<!-- Pie de página -->
<footer style="background-color: #2C1810; color: #F5EFE6;" class="px-12 py-6 mt-12 text-center">
    <p style="color: #8B6914;" class="italic">La Memoria del Hilo — TP Diseño de Sistemas — Escuela Da Vinci</p>
</footer>

</body>
</html>
