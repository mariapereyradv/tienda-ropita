<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Venta Efectivo - La Memoria del Hilo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" th:href="@{/estilos.css}"/>
</head>
<body>

<!-- Header -->
<div class="hero-memoria">
    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div>
            <p class="numero-pagina">La Memoria del Hilo — 003</p>
            <h1 class="title is-1">La Memoria<br>del Hilo</h1>
            <div class="divisor"></div>
            <p class="eslogan">Moda atemporal — Buenos Aires</p>
        </div>
        <p class="eslogan" style="max-width:280px; text-align:right; line-height:1.8;">
            "Cada prenda guarda una historia"
        </p>
    </div>
</div>

<!-- Navegación -->
<div class="nav-oliva">
    <a href="/">Inicio</a>
    <a href="/prendas">Prendas</a>
    <a href="/clientes">Clientes</a>
    <a href="/ventas" class="activo">Ventas</a>
</div>

<!-- Contenido -->
<section class="seccion">

    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:48px;">
        <div>
            <h2 class="title is-2">Nueva Venta en Efectivo</h2>
            <div class="divisor"></div>
        </div>
        <a href="/ventas" class="button is-light">← Volver</a>
    </div>

    <div class="box" style="max-width: 640px;">
        <form th:action="'/ventas/nueva/efectivo'"
              th:object="${venta}" method="post">

            <div class="field">
                <label class="label">Cliente</label>
                <div class="control">
                    <div class="select is-fullwidth">
                        <select th:field="*{cliente}">
                            <option value="">Seleccioná un cliente</option>
                            <option th:each="cliente : ${clientes}"
                                    th:value="${cliente.id}"
                                    th:text="${cliente.nombre + ' ' + cliente.apellido}"></option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="field">
                <label class="label">Fecha</label>
                <div class="control">
                    <input class="input" type="date" th:field="*{fecha}"/>
                </div>
            </div>

            <div class="field" style="margin-bottom: 32px;">
                <label class="label">Prendas</label>
                <div class="control">
                    <div class="select is-fullwidth">
                        <select name="prendaId">
                            <option value="">Seleccioná una prenda</option>
                            <option th:each="prenda : ${prendas}"
                                    th:value="${prenda.id}"
                                    th:text="${prenda.nombre + ' - $' + prenda.precioBase}"></option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="buttons">
                <button type="submit" class="button is-primary">Guardar venta</button>
                <a href="/ventas" class="button is-light">Cancelar</a>
            </div>

        </form>
    </div>

</section>

<!-- Footer -->
<footer style="background-color: #3D2415; padding: 40px 80px; text-align: center; border-top: 4px solid #8B6914;">
    <p style="font-family: 'Playfair Display', serif; font-style: italic; font-size: 16px; color: #8B6914;">
        La Memoria del Hilo — TP Diseño de Sistemas — Escuela Da Vinci
    </p>
</footer>

</body>
</html>
