<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Venta Efectivo - La Memoria del Hilo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" th:href="@{/estilos.css}"/>
</head>
<body>

<!-- Header -->
<div class="hero-memoria">
    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div>
            <p class="numero-pagina">La Memoria del Hilo — 003</p>
            <h1 class="title is-1">La Memoria<br>del Hilo</h1>
            <div class="divisor"></div>
            <p class="eslogan">Moda atemporal — Buenos Aires</p>
        </div>
        <p class="eslogan" style="max-width:280px; text-align:right; line-height:1.8;">
            "Cada prenda guarda una historia"
        </p>
    </div>
</div>

<!-- Navegación -->
<div class="nav-oliva">
    <a href="/">Inicio</a>
    <a href="/prendas">Prendas</a>
    <a href="/clientes">Clientes</a>
    <a href="/ventas" class="activo">Ventas</a>
</div>

<!-- Contenido -->
<section class="seccion">

    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:48px;">
        <div>
            <h2 class="title is-2">Nueva Venta en Efectivo</h2>
            <div class="divisor"></div>
        </div>
        <a href="/ventas" class="button is-light">← Volver</a>
    </div>

    <div class="box" style="max-width: 760px;">
        <form th:action="'/ventas/nueva/efectivo'" method="post">

            <div class="field">
                <label class="label">Cliente</label>
                <div class="control">
                    <div class="select is-fullwidth">
                        <select name="clienteId">
                            <option value="">Seleccioná un cliente</option>
                            <option th:each="cliente : ${clientes}"
                                    th:value="${cliente.id}"
                                    th:text="${cliente.nombre + ' ' + cliente.apellido}"></option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="field">
                <label class="label">Fecha</label>
                <div class="control">
                    <input class="input" type="date" name="fecha"/>
                </div>
            </div>

            <div class="divisor"></div>

            <!-- Tabla de prendas -->
            <label class="label" style="margin-bottom:16px;">Prendas</label>

            <table class="table" id="tablaDetalles" style="margin-bottom:16px;">
                <thead>
                <tr>
                    <th>Prenda</th>
                    <th>Cantidad</th>
                    <th>Quitar</th>
                </tr>
                </thead>
                <tbody id="cuerpoDetalles">
                <tr id="fila-0">
                    <td>
                        <div class="select is-fullwidth">
                            <select name="prendaIds">
                                <option value="">Seleccioná</option>
                                <option th:each="prenda : ${prendas}"
                                        th:value="${prenda.id}"
                                        th:text="${prenda.nombre + ' - $' + prenda.precioBase}"></option>
                            </select>
                        </div>
                    </td>
                    <td>
                        <input class="input" type="number" name="cantidades" value="1" min="1"/>
                    </td>
                    <td>
                        <button type="button" class="button is-danger is-small"
                                onclick="quitarFila('fila-0')">✕</button>
                    </td>
                </tr>
                </tbody>
            </table>

            <button type="button" class="button is-light" style="margin-bottom:32px;"
                    onclick="agregarFila()">+ Agregar prenda</button>

            <div class="divisor"></div>

            <div class="buttons" style="margin-top:24px;">
                <button type="submit" class="button is-primary">Guardar venta</button>
                <a href="/ventas" class="button is-light">Cancelar</a>
            </div>

        </form>
    </div>

</section>

<!-- Footer -->
<footer style="background-color: #3D2415; padding: 40px 80px; text-align: center; border-top: 4px solid #8B6914;">
    <p style="font-family: 'Playfair Display', serif; font-style: italic; font-size: 16px; color: #8B6914;">
        La Memoria del Hilo — TP Diseño de Sistemas — Escuela Da Vinci
    </p>
</footer>

<script>
    // Lista de prendas disponibles desde Thymeleaf
    const prendas = [
        /*[[${prendas}]]*/ []
    ];

    let contadorFilas = 1;

    function agregarFila() {
        const tbody = document.getElementById('cuerpoDetalles');
        const idFila = 'fila-' + contadorFilas;

        // Construimos las opciones del select
        let opciones = '<option value="">Seleccioná</option>';
        document.querySelector('#fila-0 select').querySelectorAll('option').forEach(opt => {
            if (opt.value) opciones += `<option value="${opt.value}">${opt.text}</option>`;
        });

        const fila = `
            <tr id="${idFila}">
                <td>
                    <div class="select is-fullwidth">
                        <select name="prendaIds">${opciones}</select>
                    </div>
                </td>
                <td>
                    <input class="input" type="number" name="cantidades" value="1" min="1"/>
                </td>
                <td>
                    <button type="button" class="button is-danger is-small"
                            onclick="quitarFila('${idFila}')">✕</button>
                </td>
            </tr>`;

        tbody.insertAdjacentHTML('beforeend', fila);
        contadorFilas++;
    }

    function quitarFila(idFila) {
        const fila = document.getElementById(idFila);
        if (document.querySelectorAll('#cuerpoDetalles tr').length > 1) {
            fila.remove();
        }
    }
</script>

</body>
</html>
